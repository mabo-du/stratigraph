name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Web (GitHub Pages) ──────────────────────────────────────────────────
  publish-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - run: npm ci
        working-directory: ./

      - run: npm run build
        working-directory: ./app

      - uses: actions/upload-pages-artifact@v5
        with:
          path: "./app/dist"

      - id: deployment
        uses: actions/deploy-pages@v4

  # ── Desktop (Tauri builds) ──────────────────────────────────────────────
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: npm ci
        working-directory: ./

      - name: Install Windows platform dependencies
        if: runner.os == 'Windows'
        run: npm install --no-save @tauri-apps/cli-win32-x64-msvc @rollup/rollup-win32-x64-msvc
        working-directory: ./

      - name: Install macOS platform dependencies
        if: runner.os == 'macOS'
        run: npm install --no-save @tauri-apps/cli-darwin-arm64 @rollup/rollup-darwin-arm64
        working-directory: ./

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "StratiGraph ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install StratiGraph."
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundle }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Combine release notes ───────────────────────────────────────────────
  create-release:
    needs: [publish-web, build-tauri]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          name: StratiGraph ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ── PyPI publish ────────────────────────────────────────────────────────
  publish-pypi:
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Build package
        working-directory: packages/stratigraph-sync-python
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/stratigraph-sync-python/dist
